#边境精灵
概述: 在远古时代部分始源精灵离开翡翠之心，在大陆的极端环境中的特定智慧种族结合的精灵分支的总称。他们与翡翠之心的精灵已在文化和生理上产生显著差异
分支详述:
  太阳精灵:
    栖息地: 赤金沙海
    特征: 结合古代镀金者血脉，使肤色为古铜或赤金色，发色如金盏花或天堂鸟，身形精悍紧实。擅长光与火焰的塑能及幻术
    现状: 曾建立的沙漠王国已在历史中被毁，如今回归古老的游牧生活。因人口稀少，长期受到捕奴活动的威胁，族群濒危
  雪精灵:
    栖息地: 极北的永冻冰原
    特征: 结合霜巨人血脉，使肤色苍白如雪，发色如昙花或蓝雪花，耳朵比其他精灵稍短。擅长与灵魂紧密绑定的臻冰魔法，过度使用会导致身体不可逆地晶化
    现状: 在过去某个不为人知的历史事件中，该族群为构筑某种巨大的魔法屏障，即叹息之墙，而集体牺牲，纯血已然灭绝